<!-- main-layout.component.html -->
<div class="d-flex" style="min-height: 100vh;">
  <!-- Inclusion du composant personnalisé Angular de la barre latérale (<app-sidebar>) -->
  <app-sidebar class="sidebar-fixed"></app-sidebar>

  <!-- Colonne de droite : navbar + contenu -->
  <div class="flex-grow-1 d-flex flex-column" style="margin-left: 220px; margin-top: 5px;">
    <!-- Inclusion du composant personnalisé Angular de la barre de navigation (<app-navbar>) -->
    <app-navbar></app-navbar>

    <main class="flex-grow-1 p-4">
      <!-- Directive structurelle et point de repère (<router-outlet>) indiquant à Angular où injecter dynamiquement les composants associés aux routes actives -->
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
