<div class="container-fluid p-4">


    <div class="d-flex justify-content-between align-items-center mb-4">
      <div class="mb-4">
        <h2 class="text-white fw-bold">
          <!-- Le nom de l'entrepot -->
          {{ nomEntrepot() }}
        </h2>

        <p class="text-secondary">
          Liste des produits de cet entrepôt
        </p>
      </div>

    <div class="d-flex gap-2">
      <!-- Property Binding [routerLink] pour rediriger vers le formulaire d'ajout -->
      <button
        class="btn btn-light fw-semibold"
        [routerLink]="'/produitform'">
        + Ajouter un produit
      </button>

      <!-- Event Binding (click) déclenchant la méthode onAnnuler() du composant -->
      <button
        type="button"
        class="btn btn-secondary btn-sm"
        (click)="onAnnuler()">
        <i class="bi bi-arrow-left"></i>
        Retour
      </button>
    </div>
  </div>

  <div class="row g-4">

    <!-- Boucle Angular (@for) itérant sur le signal produit() avec optimisation du suivi par identifiant (track) -->
    @for (product of produit(); track product.id) {

      <div class="col-md-4">

        <div class="card bg-dark text-white border-secondary shadow-lg rounded-4 p-3 h-100">

          <!-- En-tête -->
          <div class="d-flex justify-content-between align-items-start">

            <div class="bg-secondary bg-opacity-25 rounded-3 p-3">
              <i class="bi bi-box fs-4"></i>
            </div>

              <!-- Directive [ngClass] pour ajouter dynamiquement des classes de badge Bootstrap selon l'état du produit -->
              <span class="badge rounded-pill px-3 py-2" [ngClass]="{
                'text-bg-success': product.etat === 'disponible',
                'text-bg-warning text-dark': product.etat === 'réservé',
                'text-bg-danger': product.etat === 'périmé'
              }">
                <!-- Directive [ngClass] pour charger l'icône Bootstrap correspondante à l'état actuel -->
                <i class="bi me-1" [ngClass]="{
                  'bi-check-circle': product.etat === 'disponible',
                  'bi-exclamation-triangle': product.etat === 'réservé',
                  'bi-x-circle': product.etat === 'périmé'
                }"></i>
                <!-- Interpolation (Data Binding) pour afficher la valeur textuelle de l'état -->
                {{ product.etat }}
              </span>

          </div>

          <!-- Nom -->
          <div class="mt-3">
            <!-- Interpolation (Data Binding) pour le nom du produit courant -->
            <h4 class="fw-bold mb-1">{{ product.nom }}</h4>
            <p class="text-secondary mb-0">Produits laitiers</p>
          </div>

          <!-- Informations -->
          <div class="row mt-4">

            <div class="col-6">
              <div class="bg-secondary bg-opacity-10 rounded-3 p-3">
                <small class="text-secondary">Quantité</small>
                <h5 class="fw-bold mb-0">
                  <!-- Interpolation (Data Binding) pour la quantité du produit courant -->
                  {{ product.quantite }}
                </h5>
              </div>
            </div>
          </div>

          <hr class="border-secondary">

          <!-- Boutons -->
          <div class="d-flex gap-2">

            <!-- Property Binding [routerLink] générant la route dynamique vers les détails du produit -->
            <button
              class="btn btn-outline-light flex-grow-1"
              [routerLink]="['/productdetail', product.id]">
              <i class="bi bi-eye me-2"></i>
              Détails
            </button>


              <!-- Combinaison de Property Binding [routerLink] pour la navigation et d'Event Binding (click) exécutant transfererProduit() -->
              <button
                class="btn btn-outline-primary w-80 py-32 rounded-3"
                [routerLink]="['/transfer', product.id]"
                (click)="transfererProduit(product.id)">
                <i class="bi bi-arrow-left-right me-2"></i>
              </button>

              <!-- Property Binding [routerLink] pour la route dynamique vers le formulaire d'édition -->
              <button
                class="btn btn-outline-light"
                [routerLink]="['/produitform', product.id]">
                <i class="bi bi-pencil"></i>
              </button>

              <!-- Event Binding (click) interceptant le clic pour lancer la méthode onDelete() -->
              <button
                class="btn btn-outline-danger"
                (click)="onDelete(product.id)">
                <i class="bi bi-trash"></i>
              </button>

          </div>

        </div>

      </div>

    } @empty { <!-- Bloc alternatif (@empty) affiché si le tableau produit() ne contient aucun élément -->

      <div class="col-12">

        <div class="alert alert-warning text-center">
          Aucun produit trouvé pour cet entrepôt.
        </div>

      </div>

    }

  </div>

</div>
